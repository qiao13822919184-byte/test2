name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # --- 关键修复：安装 Node 22 ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0  # 👈 强制使用 Astro 要求的最低版本
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build and Upload to Pages
        uses: withastro/action@v2
        with:
          package-manager: npm
          # 这里不需要再额外写 build 脚本，action 会自动处理

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
